name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        
      - name: Run unit tests
        run: cargo test --lib
        
      - name: Run integration tests (no GPU)
        run: cargo test --features mock --test '*' -- --skip gpu
        
      - name: Check formatting
        run: cargo fmt --check
        
      - name: Clippy linting
        run: cargo clippy -- -D warnings

  # Optional: GPU tests on self-hosted runner
  test-gpu:
    runs-on: [self-hosted, cuda]
    if: github.ref == 'refs/heads/main'  # Only on main branch
    steps:
      - uses: actions/checkout@v4
      - name: Run GPU tests
        run: cargo test --features cuda -- --nocapture